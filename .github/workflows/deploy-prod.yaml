name: Deploy to Prod

on:
  push:
    tags:
      - 'v*'          # Dispara quando um tag que comece com "v" (ex: v1.0.0) for criada
    branches:
      - main          # Garante que o commit tagueado pertence à branch main

jobs:
  deploy-prod:
    name: Deploy (Prod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configurar SSH para acesso ao servidor Prod
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS_PROD }}" >> ~/.ssh/known_hosts
          # (ou alternativamente: ssh-keyscan -H ${{ secrets.HOST_PROD }} >> ~/.ssh/known_hosts)
        shell: bash

      - name: Deploy via SSH (Prod)
        run: |
          scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no scripts/deploy_prod.sh ${{ secrets.USER_PROD }}@${{ secrets.HOST_PROD }}:/tmp/deploy_prod.sh
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.USER_PROD }}@${{ secrets.HOST_DEV }} "bash /tmp/deploy_prod.sh"
          EOSSH
