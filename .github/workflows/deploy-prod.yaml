name: Deploy to Prod

on:
  push:
    tags:
      - 'v*'          # Dispara quando um tag que comece com "v" (ex: v1.0.0) for criada
    branches:
      - main          # Garante que o commit tagueado pertence à branch main

permissions:
  contents: read

concurrency:
  group: prod-deploy
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: Deploy (Prod)
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_PORT: ${{ secrets.PORT != '' && secrets.PORT || '22' }}
      ARCHIVE_NAME: logcenter_${{ github.ref_name }}_${{ github.sha }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # necessário pro check de ancestralidade

      - name: Garantir que a tag aponta para main
        run: |
          git fetch origin main
          # Falha se o commit da tag não for proveninete de main
          git merge-base --is-ancestor ${{ github.sha }} origin/main || {
            echo "::error ::A tag não aponta para um commit da branch main. Abortando deploy."
            exit 1
          }

      - name: Configurar SSH para acesso ao servidor Prod
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.KNOWN_HOSTS_PROD }}" >> ~/.ssh/known_hosts

      - name: Empacotamento
        run: |
          tar -czf "${ARCHIVE_NAME}" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "tests" \
            .

      - name: Enviar pacote para o servidor (scp)
        run: |
          scp -P "${SSH_PORT}" -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes \
            "${ARCHIVE_NAME}" \
            "${{ secrets.USER_PROD }}@${{ secrets.HOST_PROD }}:/tmp/${ARCHIVE_NAME}"

      - name: Deploy remoto (ssh)
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_rsa -o StrictHostKeyChecking=yes \
            "${{ secrets.USER_PROD }}@${{ secrets.HOST_PROD }}" \
            "set -euo pipefail;
             echo '[PROD DEPLOY] Iniciando...';
             APP_DIR='${{ secrets.REMOTE_PATH_PROD }}';
             ARCH='/tmp/${ARCHIVE_NAME}';
             mkdir -p \"$APP_DIR\";
             # preserva .env local e limpa o resto
             find \"$APP_DIR\" -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} + || true;
             tar -xzf \"$ARCH\" -C \"$APP_DIR\";
             cd \"$APP_DIR\";
             export ENV='${{ secrets.ENV_PROD }}';
             docker compose down || true;
             docker compose up -d --build;
             docker compose ps;
             echo '[PROD DEPLOY] OK - tag: ${{ github.ref_name }}';"
