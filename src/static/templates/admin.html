<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogCenter - Admin</title>
  <link rel="stylesheet" href="/src/static/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <h1>Admin de Projetos - LogCenter</h1>
  <!-- Cabeçalho com navegação -->
  <header>
    <nav>
      <a href="/src/static/templates/admin.html">Projetos</a> |
      <a href="/src/static/templates/clients.html">Clientes</a> |
      <a href="#" id="logout-link">Logout</a>
    </nav>
  </header>
  
  <!-- TODO - implement filters later -->
  <!-- <div class="filter-form" hidden>
    <label>Slug: <input type="text" id="filter-slug"></label>
    <label>Título: <input type="text" id="filter-tittle"></label>
    <label>Notas: <input type="text" id="filter-notes"></label>
    <label>URL Original: <input type="text" id="filter-original"></label>
    <label>Callback URL: <input type="text" id="filter-callback"></label>
    <label>De: <input type="date" id="filter-date-from"></label>
    <label>Até: <input type="date" id="filter-date-to"></label>
    <button id="apply-filters-btn">Aplicar Filtros</button>
  </div> -->

  <div id="loading-spinner" class="spinner" style="display: none;"></div>

  <div class="container">
    <h2>Lista de Projetos</h2>
    <!-- Mensagens de erro/sucesso -->
    <p id="error-msg" class="error"></p>
    
    <!-- Formulário para criação de novo projeto -->
    <form id="new-project-form">
      <label for="new-project-code">Nome do novo projeto:</label><br>
      <input type="text" id="new-project-code" name="new-project-code" required>
      <button type="submit">Criar Projeto</button>
    </form>
    
    <!-- Tabela de projetos -->
    <table id="projects-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Projeto</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <!-- Linhas de projetos serão inseridas aqui via JS -->
      </tbody>
    </table>
  </div>

  <div class="pagination" id="pagination" hidden>
    <button id="prev-page-btn" disabled>Anterior</button>
    <span id="page-info">Página 1</span>
    <button id="next-page-btn" disabled>Próxima</button>
  </div>

  
  <!-- Script JavaScript da página de projetos -->
  <script src="/src/static/js/admin.js"></script>
</body>
</html>
