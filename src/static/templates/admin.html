<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LogCenter - Admin</title>
  <link rel="stylesheet" href="/src/static/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <h1>Admin de Projetos - LogCenter</h1>
  <!-- Cabeçalho com navegação -->
  <div class="controls">
    <button id="projects-btn">Projetos</button>
    <button id="new-project-btn">Novo Projeto</button>
    <button id="reload-btn">Carregar</button>
    <button id="export-btn" hidden>Exportar CSV</button>
    <button id="clients-btn">Clientes</button>
    <button id="logout-btn">Logout</button>
  </div>
  
  <!-- TODO - implement filters later -->
  <div class="filter-form" hidden>
    <button id="apply-filters-btn" hidden>Aplicar Filtros</button>
  </div>

  <div id="loading-spinner" class="spinner" style="display: none;"></div>

  <div id="project-container" class="project-grid"></div>

  <div class="pagination" id="pagination" hidden>
    <button id="prev-page-btn" disabled>Anterior</button>
    <span id="page-info">Página 1</span>
    <button id="next-page-btn" disabled>Próxima</button>
  </div>

  
  <!-- Script JavaScript da página de projetos -->
  <script src="/src/static/js/admin.js"></script>
</body>
</html>
